<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>야간 투시 (Night Vision)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      overflow: hidden;
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    #app {
      position: relative;
      width: 100vw; height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
    }
    .tabs {
      display: flex; width: 100%;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      padding-top: env(safe-area-inset-top);
    }
    .tab {
      flex: 1; padding: 14px 4px;
      background: transparent; color: #889;
      border: none; font-size: 14px; font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: #00ff88; border-bottom-color: #00ff88; }
    .stage {
      position: relative; flex: 1; width: 100%;
      overflow: hidden; background: #000;
    }
    video, canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    video { visibility: hidden; }
    canvas { z-index: 2; display: block; }
    .controls {
      position: absolute; left: 0; right: 0; bottom: 0;
      z-index: 5;
      padding: 16px 16px calc(24px + env(safe-area-inset-bottom));
      display: flex; justify-content: center;
      pointer-events: none;
    }
    .shutter {
      pointer-events: auto;
      width: 72px; height: 72px; border-radius: 50%;
      border: 4px solid #fff; background: #ff3b3b;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.55);
      transition: transform .1s;
    }
    .shutter:active { transform: scale(0.92); }
    .shutter:disabled { opacity: .5; cursor: not-allowed; }
    .hidden { display: none !important; }
    .toast {
      position: absolute;
      top: calc(64px + env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      background: rgba(220,40,40,0.92);
      color: #fff; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; z-index: 20;
      max-width: 86%; text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,.5);
    }
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 50; padding: 16px;
    }
    .modal img {
      max-width: 100%; max-height: 70vh;
      border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.6);
      background: #111;
    }
    .modal .actions { margin-top: 18px; display: flex; gap: 12px; }
    .btn {
      background: #00ff88; color: #000;
      border: none; padding: 11px 20px; border-radius: 24px;
      font-weight: 700; font-size: 14px;
      cursor: pointer; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn.alt { background: #3a3a3a; color: #fff; }
    .spinner {
      width: 56px; height: 56px;
      border: 5px solid rgba(255,255,255,0.18);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress {
      color: #00ff88; margin-top: 14px;
      font-size: 14px; text-align: center;
    }
    #captureLoading { text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <div class="tabs" id="tabs">
      <button class="tab active" data-mode="filter">필터 모드</button>
      <button class="tab" data-mode="longexposure">장노출 모드</button>
      <button class="tab" data-mode="sensor">센서 모드</button>
    </div>
    <div class="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="controls hidden" id="controls">
        <button class="shutter" id="shutter" aria-label="촬영"></button>
      </div>
      <div class="toast hidden" id="toast"></div>
    </div>
  </div>

  <div class="modal hidden" id="captureModal">
    <div id="captureLoading">
      <div class="spinner"></div>
      <div class="progress" id="captureProgress">장노출 촬영 중... 0%</div>
    </div>
    <img id="captureImage" class="hidden" alt="capture result" />
    <div class="actions hidden" id="captureActions">
      <a class="btn" id="downloadBtn" download="night-vision.png">저장</a>
      <button class="btn alt" id="closeModalBtn">닫기</button>
    </div>
  </div>

  <script>
    'use strict';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const tabs = document.getElementById('tabs');
    const controls = document.getElementById('controls');
    const shutterBtn = document.getElementById('shutter');
    const toast = document.getElementById('toast');
    const captureModal = document.getElementById('captureModal');
    const captureLoading = document.getElementById('captureLoading');
    const captureProgress = document.getElementById('captureProgress');
    const captureImage = document.getElementById('captureImage');
    const captureActions = document.getElementById('captureActions');
    const downloadBtn = document.getElementById('downloadBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    let stream = null;
    let mode = 'filter';
    let rafId = null;
    let capturing = false;

    function showToast(msg, duration = 0) {
      toast.textContent = msg;
      toast.classList.remove('hidden');
      if (duration > 0) setTimeout(() => toast.classList.add('hidden'), duration);
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(2, Math.floor(rect.width * dpr));
      canvas.height = Math.max(2, Math.floor(rect.height * dpr));
    }

    async function initCamera() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw Object.assign(new Error('NotSupported'), { name: 'NotSupportedError' });
        }
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          showToast('카메라는 HTTPS 환경에서만 작동합니다.');
          return;
        }
        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;
        await video.play().catch(() => {});
      } catch (err) {
        console.error('Camera init failed:', err);
        let msg = '카메라 접근에 실패했습니다.';
        const name = err && err.name;
        if (name === 'NotAllowedError' || name === 'SecurityError') {
          msg = '카메라 권한이 거부되었습니다. 브라우저 설정에서 권한을 허용해 주세요.';
        } else if (name === 'NotFoundError' || name === 'OverconstrainedError') {
          msg = '사용 가능한 후면 카메라를 찾을 수 없습니다.';
        } else if (name === 'NotSupportedError') {
          msg = '이 브라우저는 카메라 API를 지원하지 않습니다.';
        } else if (name === 'NotReadableError') {
          msg = '다른 앱이 카메라를 사용 중입니다.';
        }
        showToast(msg);
      }
    }

    function drawVideoCover(v, c, dw, dh) {
      const vw = v.videoWidth, vh = v.videoHeight;
      if (!vw || !vh) return false;
      const vRatio = vw / vh;
      const cRatio = dw / dh;
      let sx, sy, sw, sh;
      if (vRatio > cRatio) {
        sh = vh; sw = vh * cRatio;
        sx = (vw - sw) / 2; sy = 0;
      } else {
        sw = vw; sh = vw / cRatio;
        sx = 0; sy = (vh - sh) / 2;
      }
      c.drawImage(v, sx, sy, sw, sh, 0, 0, dw, dh);
      return true;
    }

    // ============ FILTER MODE ============
    function renderFilter() {
      if (mode !== 'filter') return;
      if (!video.videoWidth) {
        rafId = requestAnimationFrame(renderFilter);
        return;
      }
      const w = canvas.width, h = canvas.height;
      ctx.save();
      ctx.filter = 'brightness(2.0) contrast(1.35) saturate(0)';
      drawVideoCover(video, ctx, w, h);
      ctx.restore();

      try {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const lum = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
          const boost = Math.min(255, lum * 1.35 + 12);
          d[i]   = (boost * 0.10) | 0;
          d[i+1] = boost | 0;
          d[i+2] = (boost * 0.18) | 0;
        }
        ctx.putImageData(img, 0, 0);
      } catch (_) { /* ignore frame errors */ }

      const grad = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.35, w/2, h/2, Math.max(w,h)*0.65);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      rafId = requestAnimationFrame(renderFilter);
    }

    // ============ LONG EXPOSURE MODE ============
    function renderLongExposurePreview() {
      if (mode !== 'longexposure') return;
      if (capturing) return;
      if (!video.videoWidth) {
        rafId = requestAnimationFrame(renderLongExposurePreview);
        return;
      }
      ctx.save();
      ctx.filter = 'brightness(1.25) contrast(1.1)';
      drawVideoCover(video, ctx, canvas.width, canvas.height);
      ctx.restore();
      rafId = requestAnimationFrame(renderLongExposurePreview);
    }

    async function startLongExposure() {
      if (capturing) return;
      if (!video.videoWidth) {
        showToast('카메라가 아직 준비되지 않았습니다.', 1800);
        return;
      }
      capturing = true;
      shutterBtn.disabled = true;
      captureImage.classList.add('hidden');
      captureActions.classList.add('hidden');
      captureLoading.classList.remove('hidden');
      captureModal.classList.remove('hidden');
      captureProgress.textContent = '장노출 촬영 중... 0%';

      const w = canvas.width, h = canvas.height;
      const acc = new Float32Array(w * h * 3);
      const durationMs = 3000;
      const startTs = performance.now();
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tctx = tmp.getContext('2d', { willReadFrequently: true });

      await new Promise(resolve => {
        function step() {
          const elapsed = performance.now() - startTs;
          tctx.clearRect(0, 0, w, h);
          drawVideoCover(video, tctx, w, h);
          try {
            const frame = tctx.getImageData(0, 0, w, h).data;
            for (let i = 0, j = 0; i < frame.length; i += 4, j += 3) {
              if (frame[i]   > acc[j])   acc[j]   = frame[i];
              if (frame[i+1] > acc[j+1]) acc[j+1] = frame[i+1];
              if (frame[i+2] > acc[j+2]) acc[j+2] = frame[i+2];
            }
          } catch (_) { /* skip frame */ }
          const pct = Math.min(100, (elapsed / durationMs * 100) | 0);
          captureProgress.textContent = `장노출 촬영 중... ${pct}%`;
          if (elapsed >= durationMs) return resolve();
          requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });

      const out = tctx.createImageData(w, h);
      const od = out.data;
      for (let i = 0, j = 0; i < od.length; i += 4, j += 3) {
        od[i]   = Math.min(255, acc[j]   * 1.15);
        od[i+1] = Math.min(255, acc[j+1] * 1.15);
        od[i+2] = Math.min(255, acc[j+2] * 1.15);
        od[i+3] = 255;
      }
      tctx.putImageData(out, 0, 0);

      let dataUrl;
      try { dataUrl = tmp.toDataURL('image/png'); }
      catch (e) {
        console.error(e);
        showToast('이미지 생성에 실패했습니다.', 2500);
        captureModal.classList.add('hidden');
        capturing = false; shutterBtn.disabled = false;
        return;
      }

      captureImage.src = dataUrl;
      downloadBtn.href = dataUrl;
      captureLoading.classList.add('hidden');
      captureImage.classList.remove('hidden');
      captureActions.classList.remove('hidden');

      capturing = false;
      shutterBtn.disabled = false;
    }

    closeModalBtn.addEventListener('click', () => {
      captureModal.classList.add('hidden');
    });

    // ============ SENSOR MODE (WebXR depth-sensing) ============
    async function startSensorMode() {
      stopRenderLoop();
      const w = canvas.width, h = canvas.height;
      if (video.videoWidth) {
        ctx.save();
        ctx.filter = 'brightness(0.45) blur(2px)';
        drawVideoCover(video, ctx, w, h);
        ctx.restore();
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
      }

      let supported = false;
      try {
        if (!('xr' in navigator) || !navigator.xr) throw new Error('NoWebXR');
        if (typeof navigator.xr.isSessionSupported !== 'function') throw new Error('NoIsSessionSupported');
        supported = await navigator.xr.isSessionSupported('immersive-ar');
        if (!supported) throw new Error('NoImmersiveAR');

        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['depth-sensing'],
          depthSensing: {
            usagePreference: ['cpu-optimized', 'gpu-optimized'],
            dataFormatPreference: ['luminance-alpha', 'float32']
          }
        });
        await session.end();
        drawSensorMessage('하드웨어 깊이 센서를 사용할 수 있습니다.', '#00ff88');
      } catch (err) {
        console.warn('Depth sensor unavailable:', err && err.message || err);
        drawSensorMessage('현재 기기는 하드웨어 깊이 센서를 지원하지 않습니다', '#ff6666');
      }
    }

    function drawSensorMessage(text, color) {
      const w = canvas.width, h = canvas.height;
      const boxH = Math.max(120, h * 0.22);
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, h/2 - boxH/2, w, boxH);
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const fontSize = Math.max(16, Math.floor(w / 26));
      ctx.font = `600 ${fontSize}px -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif`;

      const maxWidth = w * 0.88;
      const words = text.split(/\s+/);
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth) {
          if (line) lines.push(line);
          line = word;
        } else { line = test; }
      }
      if (line) lines.push(line);
      const startY = h/2 - ((lines.length - 1) * fontSize * 1.3) / 2;
      lines.forEach((l, i) => ctx.fillText(l, w/2, startY + i * fontSize * 1.3));
    }

    // ============ MODE SWITCHING ============
    function stopRenderLoop() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    async function setMode(newMode) {
      if (mode === newMode && rafId) return;
      mode = newMode;
      stopRenderLoop();
      tabs.querySelectorAll('.tab').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === newMode);
      });
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (newMode === 'filter') {
        controls.classList.add('hidden');
        rafId = requestAnimationFrame(renderFilter);
      } else if (newMode === 'longexposure') {
        controls.classList.remove('hidden');
        rafId = requestAnimationFrame(renderLongExposurePreview);
      } else if (newMode === 'sensor') {
        controls.classList.add('hidden');
        await startSensorMode();
      }
    }

    tabs.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab');
      if (!btn) return;
      setMode(btn.dataset.mode);
    });

    shutterBtn.addEventListener('click', () => {
      if (mode === 'longexposure') startLongExposure();
    });

    let resizeTimer = null;
    function handleResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resizeCanvas();
        if (mode === 'sensor') startSensorMode();
      }, 120);
    }
    window.addEventListener('resize', handleResize);
    window.addEventListener('orientationchange', handleResize);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopRenderLoop();
      } else if (mode === 'filter') {
        rafId = requestAnimationFrame(renderFilter);
      } else if (mode === 'longexposure' && !capturing) {
        rafId = requestAnimationFrame(renderLongExposurePreview);
      } else if (mode === 'sensor') {
        startSensorMode();
      }
    });

    (async function bootstrap() {
      resizeCanvas();
      await initCamera();
      setMode('filter');
    })();
  </script>
</body>
</html>
